<!DOCTYPE html>
<html lang="zh-CN">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>墨韵山河 · 诗地图</title>
 <link rel="preconnect" href="https://fonts.googleapis.com">
 <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
 <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@300;400;600&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
 <link rel="stylesheet" href="css/style.css">
</head>
<body>
 <div class="paper-texture"></div>
 <div class="mist mist-1"></div>
 <div class="mist mist-2"></div>

 <header class="site-header">
 <h1 class="site-title">墨韵山河</h1>
 <p class="site-subtitle">点击灵石，诗自浮现</p>
 </header>

 <main class="map-container" id="mapContainer">
  <div class="map-world" id="mapWorld">

   <!-- ==================== 仙侠世界长卷 ==================== -->
   <svg class="world-svg" viewBox="0 0 3000 1800" preserveAspectRatio="xMidYMid meet"
        xmlns="http://www.w3.org/2000/svg" aria-label="仙侠水墨山河图">

    <defs>
     <!-- 滤镜 -->
     <filter id="ink-blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5"/>
     </filter>
     <filter id="ink-wash" x="-30%" y="-30%" width="160%" height="160%">
      <feTurbulence type="fractalNoise" baseFrequency="0.035" numOctaves="3" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="7" xChannelSelector="R" yChannelSelector="G"/>
      <feGaussianBlur stdDeviation="1.5"/>
     </filter>
     <filter id="cloud-blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="18"/>
     </filter>
     <filter id="spirit-glow" x="-80%" y="-80%" width="360%" height="360%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feColorMatrix in="blur" type="matrix"
       values="0 0 0 0 0.2  0 0 0 0 0.75  0 0 0 0 0.65  0 0 0 1 0" result="colored"/>
      <feComposite in="colored" in2="SourceGraphic" operator="over"/>
     </filter>

     <!-- 渐变 -->
     <linearGradient id="skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#06091a"/>
      <stop offset="35%" stop-color="#0e1230"/>
      <stop offset="65%" stop-color="#1e1b38"/>
      <stop offset="100%" stop-color="#2d2848"/>
     </linearGradient>
     <radialGradient id="moonGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff8e0"/>
      <stop offset="55%" stop-color="#d4b060"/>
      <stop offset="100%" stop-color="#a07830" stop-opacity="0"/>
     </radialGradient>
     <radialGradient id="moonHalo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c8a840" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#c8a840" stop-opacity="0"/>
     </radialGradient>
     <radialGradient id="spiritGlowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#80ffd8" stop-opacity="0.95"/>
      <stop offset="70%" stop-color="#30d090" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#10a060" stop-opacity="0"/>
     </radialGradient>
     <linearGradient id="riverGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3a5a6a" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="#2d4a58" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#3a5a6a" stop-opacity="0.5"/>
     </linearGradient>
    <linearGradient id="peakGrad1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c8c4b8"/>
      <stop offset="100%" stop-color="#5a5850"/>
     </linearGradient>
    <linearGradient id="peakGrad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#a0a095"/>
      <stop offset="100%" stop-color="#3a3835"/>
     </linearGradient>
     <linearGradient id="cloudGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#d8e2ee" stop-opacity="0.80"/>
      <stop offset="100%" stop-color="#b8c8d8" stop-opacity="0.55"/>
     </linearGradient>
    <linearGradient id="cloudDeepGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#b8c8d8" stop-opacity="0.60"/>
      <stop offset="100%" stop-color="#8a9ab0" stop-opacity="0.30"/>
     </linearGradient>
    <linearGradient id="peakBackGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3a3850" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#28263a" stop-opacity="0.4"/>
     </linearGradient>
    <radialGradient id="jadeGrad" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#a0f0d8"/>
      <stop offset="100%" stop-color="#20a070"/>
     </radialGradient>
    <radialGradient id="fireflyGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c0ff80" stop-opacity="1"/>
      <stop offset="100%" stop-color="#40c060" stop-opacity="0"/>
     </radialGradient>
    <radialGradient id="waterfallGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#a0c8e0" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#608090" stop-opacity="0.3"/>
     </radialGradient>
    <radialGradient id="sunGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff5c0" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#e8c050" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#d0a030" stop-opacity="0"/>
     </radialGradient>
    <radialGradient id="lotusGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffe0e0"/>
      <stop offset="100%" stop-color="#e09090"/>
     </radialGradient>
    <linearGradient id="snowGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e0e8f0" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#a8b8c8" stop-opacity="0.6"/>
    </linearGradient>
    <linearGradient id="sealGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c83030"/>
      <stop offset="100%" stop-color="#8b1a1a"/>
     </linearGradient>
     <radialGradient id="blossomGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffb8c8"/>
      <stop offset="100%" stop-color="#e87888"/>
     </radialGradient>
     <radialGradient id="pagodaGrad" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#d4c080"/>
      <stop offset="100%" stop-color="#7a6030"/>
     </radialGradient>
    </defs>

    <!-- ========== 天空 ========== -->
    <rect width="3000" height="1800" fill="url(#skyGrad)"/>

    <!-- ========== 星辰 ========== -->
    <g fill="white">
     <circle cx="180"  cy="60"  r="1.1" opacity="0.7"/>
     <circle cx="420"  cy="90"  r="0.8" opacity="0.6"/>
     <circle cx="640"  cy="45"  r="1.3" opacity="0.8"/>
     <circle cx="880"  cy="120" r="0.9" opacity="0.5"/>
     <circle cx="1050" cy="75"  r="1.0" opacity="0.7"/>
     <circle cx="1220" cy="30"  r="0.8" opacity="0.6"/>
     <circle cx="1400" cy="95"  r="1.2" opacity="0.8"/>
     <circle cx="1600" cy="55"  r="0.9" opacity="0.7"/>
     <circle cx="1780" cy="115" r="1.0" opacity="0.5"/>
     <circle cx="2000" cy="40"  r="1.1" opacity="0.8"/>
     <circle cx="2200" cy="80"  r="0.8" opacity="0.6"/>
     <circle cx="2440" cy="50"  r="1.0" opacity="0.7"/>
     <circle cx="2620" cy="100" r="0.9" opacity="0.5"/>
     <circle cx="2800" cy="70"  r="1.2" opacity="0.8"/>
     <circle cx="2960" cy="130" r="0.8" opacity="0.6"/>
     <circle cx="250"  cy="160" r="0.7" opacity="0.4"/>
     <circle cx="760"  cy="185" r="0.9" opacity="0.5"/>
     <circle cx="1300" cy="150" r="0.8" opacity="0.4"/>
     <circle cx="1950" cy="175" r="1.0" opacity="0.5"/>
     <circle cx="2530" cy="155" r="0.7" opacity="0.4"/>
     <circle cx="110"  cy="220" r="0.8" opacity="0.3"/>
     <circle cx="900"  cy="240" r="0.9" opacity="0.4"/>
     <circle cx="1680" cy="200" r="0.7" opacity="0.3"/>
     <circle cx="2850" cy="190" r="1.0" opacity="0.4"/>
    </g>

    <!-- ========== 苍穹光晕 + 月亮 ========== -->
    <circle cx="2560" cy="320" r="280" fill="url(#moonHalo)"/>
    <circle cx="2560" cy="320" r="120" fill="url(#moonGrad)" filter="url(#ink-blur)"/>
    <circle cx="2560" cy="320" r="58" fill="#f0e0a0" opacity="0.90"/>
    <circle cx="2560" cy="320" r="48" fill="#fff5c8" opacity="0.60"/>

    <!-- 月中桂树影 -->
    <g fill="#c8b060" opacity="0.30" transform="translate(2548,308) scale(0.5)">
     <path d="M0,-20 Q5,-5 0,8 Q-5,-5 0,-20Z"/>
     <line x1="0" y1="-20" x2="0" y2="8" stroke-width="2"/>
    <line x1="-8" y1="-12" x2="0" y2="-18" stroke-width="1.5"/>
     <line x1="8" y1="-12" x2="0" y2="-18" stroke-width="1.5"/>
    <line x1="-10" y1="-2" x2="0" y2="-8" stroke-width="1.5"/>
     <line x1="10" y1="-2" x2="0" y2="-8" stroke-width="1.5"/>
    </g>

    <!-- ========== 仙鹤 ========== -->
    <g stroke="#c8c0a0" stroke-width="1.8" fill="none" stroke-linecap="round" opacity="0.75">
     <!-- 鹤1 高空 -->
     <path d="M2380,310 C2392,298 2398,302 2408,294 C2418,302 2424,298 2436,310"/>
     <circle cx="2394" cy="300" r="2.2" fill="#c8c0a0"/>
     <!-- 鹤2 -->
     <path d="M2470,360 C2482,348 2488,352 2498,344 C2508,352 2514,348 2526,360"/>
     <circle cx="2484" cy="350" r="2.0" fill="#c8c0a0"/>
     <!-- 鹤3 远 -->
     <path d="M2280,400 C2290,390 2295,394 2304,388 C2313,394 2318,390 2328,400"/>
     <circle cx="2293" cy="392" r="1.8" fill="#c8c0a0"/>
     <!-- 鹤4 低空 -->
     <path d="M2700,480 C2712,468 2718,472 2728,464 C2738,472 2744,468 2756,480"/>
     <circle cx="2714" cy="470" r="2.0" fill="#c8c0a0"/>
    </g>

    <!-- ========== 远景山系（退晕层） ========== -->
    <!-- 最远山 #1 -->
    <path d="M0,1050 C200,1000 380,1040 580,1015 C780,990 960,1025 1160,1005 C1360,985 1560,1020 1760,1000 C1960,980 2160,1010 2360,990 C2560,970 2760,1000 3000,985 L3000,1100 L0,1100Z"
          fill="#20203a" opacity="0.55"/>
    <!-- 远山 #2 -->
    <path d="M0,1120 C180,1090 350,1115 540,1100 C730,1085 910,1110 1100,1095 C1290,1080 1480,1110 1680,1095 C1880,1080 2080,1105 2280,1090 C2480,1075 2680,1100 3000,1088 L3000,1200 L0,1200Z"
          fill="#252538" opacity="0.65"/>
    <!-- 远山 #3 -->
    <path d="M0,1180 C160,1155 320,1180 490,1168 C660,1156 830,1178 1000,1165 C1170,1152 1350,1175 1520,1162 C1690,1149 1880,1172 2060,1159 C2240,1146 2440,1170 2640,1158 C2840,1146 3000,1165 3000,1165 L3000,1280 L0,1280Z"
          fill="#2a283a" opacity="0.72"/>
    <!-- 远山 #4 (主体山带) -->
    <path d="M0,1240 C140,1218 280,1242 440,1228 C600,1214 760,1238 920,1224 C1080,1210 1260,1234 1440,1220 C1620,1206 1800,1228 1980,1214 C2160,1200 2360,1224 2560,1210 C2760,1196 3000,1220 3000,1220 L3000,1400 L0,1400Z"
          fill="#30304a" opacity="0.78" filter="url(#ink-blur)"/>

    <!-- ========== 云海 ========== -->
    <g filter="url(#cloud-blur)">
     <!-- 主云海层 -->
     <path d="M0,1520 C200,1460 480,1550 760,1500 C1040,1450 1340,1530 1640,1480 C1940,1430 2240,1510 2540,1470 C2780,1440 3000,1490 3000,1490 L3000,1700 L0,1700Z"
           fill="url(#cloudGrad)" opacity="0.85"/>
     <!-- 云峰穿出 -->
     <ellipse cx="300" cy="1500" rx="180" ry="90" fill="#d8e6f0" opacity="0.75"/>
     <ellipse cx="680" cy="1480" rx="140" ry="70" fill="#d0dff0" opacity="0.65"/>
     <ellipse cx="1080" cy="1500" rx="200" ry="95" fill="#d8e6f0" opacity="0.70"/>
     <ellipse cx="1520" cy="1480" rx="160" ry="80" fill="#c8d8e8" opacity="0.60"/>
     <ellipse cx="1980" cy="1500" rx="180" ry="90" fill="#d8e6f0" opacity="0.72"/>
     <ellipse cx="2420" cy="1470" rx="150" ry="75" fill="#d0dff0" opacity="0.65"/>
     <ellipse cx="2780" cy="1490" rx="130" ry="65" fill="#d8e6f0" opacity="0.60"/>
     <!-- 云海第二层 -->
     <path d="M0,1600 C300,1550 650,1630 1000,1590 C1350,1550 1700,1620 2050,1580 C2400,1540 2750,1600 3000,1580 L3000,1800 L0,1800Z"
           fill="url(#cloudDeepGrad)" opacity="0.80"/>
    </g>

    <!-- ========== 灵气萤火（点缀） ========== -->
    <g>
     <circle cx="480"  cy="900"  r="3.5" fill="url(#fireflyGrad)" opacity="0.8" filter="url(#ink-blur)"/>
     <circle cx="920"  cy="1100" r="3"   fill="url(#fireflyGrad)" opacity="0.7" filter="url(#ink-blur)"/>
     <circle cx="1380" cy="800"  r="3.5" fill="url(#fireflyGrad)" opacity="0.8" filter="url(#ink-blur)"/>
     <circle cx="1650" cy="1150" r="3"   fill="url(#fireflyGrad)" opacity="0.6" filter="url(#ink-blur)"/>
     <circle cx="2020" cy="750"  r="3.5" fill="url(#fireflyGrad)" opacity="0.7" filter="url(#ink-blur)"/>
     <circle cx="2300" cy="1050" r="3"   fill="url(#fireflyGrad)" opacity="0.8" filter="url(#ink-blur)"/>
     <circle cx="2600" cy="850"  r="3.5" fill="url(#fireflyGrad)" opacity="0.6" filter="url(#ink-blur)"/>
    <circle cx="640"  cy="1180" r="2.5" fill="url(#fireflyGrad)" opacity="0.7" filter="url(#ink-blur)"/>
     <circle cx="1100" cy="1300" r="2.5" fill="url(#fireflyGrad)" opacity="0.6" filter="url(#ink-blur)"/>
     <circle cx="1800" cy="1100" r="3"   fill="url(#fireflyGrad)" opacity="0.7" filter="url(#ink-blur)"/>
     <circle cx="2500" cy="1200" r="2.5" fill="url(#fireflyGrad)" opacity="0.6" filter="url(#ink-blur)"/>
    </g>

    <!-- ========== 江河 ========== -->
    <!-- 长江主体 -->
    <path d="M-50,1380 Q200,1320 420,1360 Q640,1400 880,1340 Q1120,1280 1380,1320 Q1640,1360 1900,1300 Q2160,1240 2400,1280 Q2640,1320 2900,1280 L3050,1280 L3050,1650 L-50,1650Z"
          fill="url(#riverGrad)" filter="url(#ink-blur)"/>
    <!-- 支流 -->
    <path d="M-50,1150 Q150,1110 320,1150 Q490,1190 660,1140 Q830,1090 980,1130"
          fill="none" stroke="#3a5060" stroke-width="18" stroke-opacity="0.45" filter="url(#ink-blur)"/>
    <!-- 江面光 -->
    <path d="M100,1390 Q400,1355 700,1385 Q1000,1415 1300,1375"
          fill="none" stroke="white" stroke-opacity="0.18" stroke-width="2"/>
    <path d="M1500,1370 Q1800,1330 2100,1360 Q2400,1390 2700,1350"
          fill="none" stroke="white" stroke-opacity="0.15" stroke-width="2"/>

    <!-- ========== 地标 #1: 华山 (400,560) 悬崖主峰 ========== -->
    <g transform="translate(400,560)" filter="url(#ink-wash)">
     <!-- 山体 -->
     <path d="M-80,90 L-60,20 L-30,-60 L0,-120 L30,-60 L55,10 L70,90Z"
           fill="#3a3830" opacity="0.88"/>
     <!-- 雪顶 -->
     <path d="M-8,-115 L0,-120 L8,-115 L2,-100Z" fill="url(#snowGrad)" opacity="0.8"/>
     <!-- 松树1 -->
     <g fill="#1a1a18" transform="translate(-30,-55) scale(0.65)">
      <path d="M0,0 L-8,-20 L0,-16 L8,-20Z"/>
      <line x1="0" y1="0" x2="0" y2="8" stroke="#1a1a18" stroke-width="3"/>
     </g>
     <!-- 松树2 -->
     <g fill="#1a1a18" transform="translate(22,-40) scale(0.5)">
      <path d="M0,0 L-8,-20 L0,-16 L8,-20Z"/>
      <line x1="0" y1="0" x2="0" y2="8" stroke="#1a1a18" stroke-width="3"/>
     </g>
     <!-- 登山小路 -->
     <path d="M20,80 Q30,30 10,-55" fill="none" stroke="#a09888" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.5"/>
     <!-- 灵气 -->
     <circle cx="0" cy="-130" r="6" fill="url(#spiritGlowGrad)" filter="url(#spirit-glow)" opacity="0.7"/>
    </g>

    <!-- ========== 地标 #2: 庐山 (1180,900) 瀑布 ========== -->
    <g transform="translate(1180,900)" filter="url(#ink-wash)">
     <!-- 崖壁 -->
     <path d="M-90,90 L-70,10 L-40,-80 L0,-130 L40,-80 L65,5 L80,90Z"
           fill="#3c3832" opacity="0.85"/>
     <!-- 瀑布 -->
     <path d="M-8,-125 L-4,-125 L-4,40 L-12,40Z" fill="url(#waterfallGrad)" opacity="0.8"/>
     <path d="M4,-125 L8,-125 L8,40 L12,40Z" fill="url(#waterfallGrad)" opacity="0.8"/>
     <!-- 水潭 -->
     <ellipse cx="0" cy="55" rx="35" ry="10" fill="#608090" opacity="0.5" filter="url(#ink-blur)"/>
     <!-- 水花 -->
     <circle cx="0" cy="65" r="12" fill="#a0c0d0" opacity="0.25" filter="url(#ink-blur)"/>
     <!-- 翠松 -->
     <g fill="#1a1a18" transform="translate(45,-65) scale(0.6)">
      <path d="M0,0 L-9,-22 L0,-18 L9,-22Z"/>
      <line x1="0" y1="0" x2="0" y2="10" stroke="#1a1a18" stroke-width="3"/>
     </g>
    </g>

    <!-- ========== 地标 #3: 西湖 (2360,960) 湖光楼阁 ========== -->
    <g transform="translate(2360,960)" filter="url(#ink-blur)">
     <!-- 湖面 -->
     <ellipse cx="0" cy="20" rx="95" ry="38" fill="#4a6878" opacity="0.55"/>
     <!-- 波光 -->
     <path d="M-60,10 Q0,-5 60,12" fill="none" stroke="white" stroke-opacity="0.20" stroke-width="1.5"/>
     <!-- 湖心亭 -->
     <path d="M-12,-5 L0,-25 L12,-5Z" fill="#c8b878" opacity="0.85"/>
     <rect x="-8" y="-5" width="16" height="15" fill="#a89860" opacity="0.80"/>
     <!-- 曲桥 -->
     <path d="M-30,20 Q0,-5 30,22" fill="none" stroke="#9a8870" stroke-width="3"/>
     <!-- 荷花 -->
     <circle cx="-45" cy="15" r="6" fill="url(#lotusGrad)" opacity="0.75"/>
     <circle cx="-38" cy="22" r="5" fill="url(#lotusGrad)" opacity="0.65"/>
     <circle cx="30"  cy="10" r="5" fill="url(#lotusGrad)" opacity="0.60"/>
     <circle cx="50"  cy="18" r="4" fill="url(#lotusGrad)" opacity="0.70"/>
     <!-- 柳枝 -->
     <path d="M65,-5 Q80,5 75,20" fill="none" stroke="#4a5a3a" stroke-width="1.5" opacity="0.6"/>
     <path d="M68,-3 Q85,8 78,22" fill="none" stroke="#4a5a3a" stroke-width="1.2" opacity="0.5"/>
    </g>

    <!-- ========== 地标 #4: 山居 (1700,660) 隐居竹屋 ========== -->
    <g transform="translate(1700,660)" filter="url(#ink-wash)">
     <!-- 小山丘 -->
     <path d="M-80,50 Q-30,10 0,30 Q30,10 80,50Z" fill="#4a4838" opacity="0.75"/>
     <!-- 茅屋 -->
     <rect x="-18" y="-5" width="36" height="28" fill="#8a7860" opacity="0.85"/>
     <path d="M-24,-5 L0,-38 L24,-5Z" fill="#7a6848" opacity="0.90"/>
     <!-- 烟囱 -->
     <rect x="5" y="-42" width="6" height="10" fill="#6a5840" opacity="0.80"/>
     <path d="M4,-50 Q8,-56 12,-50" fill="none" stroke="#9a9a9a" stroke-width="1.5" opacity="0.4"/>
     <!-- 翠竹环绕 -->
     <g fill="#1a1a18">
      <line x1="-50" y1="50" x2="-50" y2="-10" stroke="#1a1a18" stroke-width="2.5"/>
      <path d="M-50,-10 Q-60,-18 -55,-25" fill="none" stroke="#1a1a18" stroke-width="1.5"/>
      <path d="M-50,-5 Q-62,-10 -58,-18" fill="none" stroke="#1a1a18" stroke-width="1.5"/>
      <line x1="50"  y1="50" x2="50"  y2="-8"  stroke="#1a1a18" stroke-width="2.5"/>
      <path d="M50,-8 Q60,-15 55,-22" fill="none" stroke="#1a1a18" stroke-width="1.5"/>
      <line x1="35"  y1="50" x2="35"  y2="-5"  stroke="#1a1a18" stroke-width="2"/>
      <path d="M35,-5 Q44,-10 40,-18" fill="none" stroke="#1a1a18" stroke-width="1.5"/>
     </g>
     <!-- 灵气 -->
     <circle cx="0" cy="-50" r="5" fill="url(#spiritGlowGrad)" filter="url(#spirit-glow)" opacity="0.6"/>
    </g>

    <!-- ========== 地标 #5: 边塞 (780,280) 关隘要塞 ========== -->
    <g transform="translate(780,280)" filter="url(#ink-wash)">
     <!-- 山脊 -->
     <path d="M-100,60 Q-40,20 0,45 Q40,20 100,60Z" fill="#3a3830" opacity="0.80"/>
     <!-- 关墙 -->
