<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>墨韵山河 · 诗地图</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@300;400;600&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="paper-texture"></div>
  <div class="mist mist-1"></div>
  <div class="mist mist-2"></div>

  <header class="site-header">
    <h1 class="site-title">墨韵山河</h1>
    <p class="site-subtitle">点击山水，诗自浮现</p>
  </header>

  <main class="map-container">
    <svg class="ink-map" viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg" aria-label="水墨山河诗地图">
      <defs>
        <filter id="ink-blur" x="-20%" y="-20%" width="140%" height="140%">
          <feGaussianBlur in="SourceGraphic" stdDeviation="2"/>
        </filter>
        <filter id="ink-wash" x="-30%" y="-30%" width="160%" height="160%">
          <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="3" result="noise"/>
          <feDisplacementMap in="SourceGraphic" in2="noise" scale="6" xChannelSelector="R" yChannelSelector="G"/>
          <feGaussianBlur stdDeviation="1.2"/>
        </filter>
        <linearGradient id="skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stop-color="#e8e4dc"/>
          <stop offset="60%" stop-color="#d4cfc4"/>
          <stop offset="100%" stop-color="#c8c0b0"/>
        </linearGradient>
        <linearGradient id="waterGrad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="#8a9a9e" stop-opacity="0.3"/>
          <stop offset="50%" stop-color="#6b7d82" stop-opacity="0.5"/>
          <stop offset="100%" stop-color="#8a9a9e" stop-opacity="0.3"/>
        </linearGradient>
        <radialGradient id="mountainGrad" cx="50%" cy="30%">
          <stop offset="0%" stop-color="#4a4a48" stop-opacity="0.9"/>
          <stop offset="100%" stop-color="#2a2a28" stop-opacity="0.4"/>
        </radialGradient>
        <radialGradient id="sun" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#caa24a" stop-opacity="0.85"/>
          <stop offset="60%" stop-color="#caa24a" stop-opacity="0.3"/>
          <stop offset="100%" stop-color="#caa24a" stop-opacity="0"/>
        </radialGradient>
      </defs>

      <!-- 天空 -->
      <rect width="1200" height="800" fill="url(#skyGrad)"/>

      <!-- 落日与光晕 -->
      <circle cx="1020" cy="150" r="160" fill="url(#sun)" opacity="0.95"/>
      <circle cx="1020" cy="150" r="60" fill="#c79a3e" opacity="0.45" filter="url(#ink-blur)"/>
      <circle cx="1020" cy="150" r="22" fill="#d8a64a" opacity="0.75"/>

      <!-- 飞鸟 -->
      <path d="M850,205 q5,-6 10,0 q5,-6 10,0" stroke="#3a3630" stroke-width="1.4" fill="none" stroke-linecap="round"/>
      <path d="M895,238 q4,-5 8,0 q4,-5 8,0" stroke="#3a3630" stroke-width="1.2" fill="none" stroke-linecap="round"/>
      <path d="M935,198 q3,-4 6,0 q3,-4 6,0" stroke="#3a3630" stroke-width="1.1" fill="none" stroke-linecap="round"/>

      <!-- 远山层 1（最远） -->
      <path d="M0,460 C140,430 280,460 420,445 C560,432 700,460 840,448 C960,438 1080,458 1200,448 L1200,800 L0,800Z" fill="#bdb6a6" opacity="0.30"/>

      <!-- 远山层 2 -->
      <path d="M0,490 C120,468 240,495 360,482 C480,470 600,498 720,486 C840,474 960,496 1080,486 C1140,481 1200,488 1200,490 L1200,800 L0,800Z" fill="#a39c8a" opacity="0.38"/>

      <!-- 远山层 3 -->
      <path d="M0,520 C140,498 280,522 420,512 C560,502 700,525 840,515 C960,507 1080,522 1200,514 L1200,800 L0,800Z" fill="#8a8472" opacity="0.44"/>

      <!-- 高空云气 -->
      <path d="M-50,430 C150,408 350,448 550,425 C700,408 900,442 1100,422 C1200,412 1250,422 1250,422 L1250,480 C1100,470 900,492 700,478 C500,468 300,488 100,472 C30,466 -50,476 -50,476Z" fill="#fff" opacity="0.20" filter="url(#ink-blur)"/>
      <path d="M760,115 C900,90 1000,132 1160,108 C1060,148 940,168 850,162Z" fill="#fff" opacity="0.16" filter="url(#ink-blur)"/>

      <!-- 远山层 4 -->
      <path d="M0,548 C110,530 220,552 330,542 C440,532 560,558 680,548 C800,538 920,556 1040,548 C1120,542 1200,550 1200,552 L1200,800 L0,800Z" fill="#6e6a5c" opacity="0.50"/>

      <!-- 主山（中景磅礴主峰，含墨晕） -->
      <path d="M-20,560 C50,545 90,520 130,510 C160,503 185,495 200,475 C210,460 222,448 236,432 C250,415 265,398 280,388 C288,382 296,378 302,386 C310,398 318,415 328,430 C348,455 375,465 402,458 C430,452 452,438 474,432 C498,427 522,432 548,444 C578,460 608,470 638,465 C668,460 698,448 728,442 C758,437 788,443 818,452 C852,461 888,468 922,470 C958,472 992,470 1028,472 C1066,475 1106,485 1140,500 C1170,512 1200,525 1220,535 L1220,800 L-20,800Z" fill="#4a4842" opacity="0.62" filter="url(#ink-wash)"/>

      <!-- 主山脊线（精致高光） -->
      <path d="M-20,560 C50,545 90,520 130,510 C160,503 185,495 200,475 C210,460 222,448 236,432 C250,415 265,398 280,388 C288,382 296,378 302,386 C310,398 318,415 328,430 C348,455 375,465 402,458 C430,452 452,438 474,432 C498,427 522,432 548,444 C578,460 608,470 638,465 C668,460 698,448 728,442 C758,437 788,443 818,452 C852,461 888,468 922,470 C958,472 992,470 1028,472 C1066,475 1106,485 1140,500" stroke="#d8d0c0" stroke-width="0.8" fill="none" opacity="0.30"/>

      <!-- 山上松树 -->
      <g fill="#2a2824">
        <path d="M165,495 l-3.5,-16 l7,0 l-3.5,16z M162.5,498 l5,1 l-5,1z"/>
        <path d="M430,460 l-3,-14 l6,0 l-3,14z M427.5,463 l5,1 l-5,1z"/>
        <path d="M640,468 l-3.5,-15 l7,0 l-3.5,15z M637.5,471 l5,1 l-5,1z"/>
        <path d="M820,452 l-3,-13 l6,0 l-3,13z M817.5,455 l5,1 l-5,1z"/>
        <path d="M1000,474 l-3,-12 l6,0 l-3,12z M997.5,477 l5,1 l-5,1z"/>
      </g>

      <!-- 中层云气 -->
      <path d="M-50,520 C150,498 350,538 550,515 C700,498 900,532 1100,512 C1200,502 1250,512 1250,512 L1250,580 C1100,570 900,592 700,578 C500,568 300,588 100,572 C30,566 -50,576 -50,576Z" fill="#fff" opacity="0.22" filter="url(#ink-blur)"/>

      <!-- 江河 -->
      <path d="M-50,600 Q200,580 400,620 Q600,660 800,600 Q1000,540 1250,580 L1250,800 L-50,800Z" fill="url(#waterGrad)" filter="url(#ink-blur)"/>

      <!-- 河面波光 -->
      <path d="M120,632 Q320,618 520,650" stroke="#fff" stroke-opacity="0.20" stroke-width="1.6" fill="none"/>
      <path d="M700,648 Q900,612 1100,642" stroke="#fff" stroke-opacity="0.18" stroke-width="1.4" fill="none"/>
      <path d="M400,670 Q560,650 720,678" stroke="#fff" stroke-opacity="0.14" stroke-width="1.2" fill="none"/>

      <!-- 孤舟渔翁 -->
      <g fill="#2a2824" stroke="#2a2824">
        <path d="M555,635 Q568,645 581,635 L578,640 L558,640Z"/>
        <line x1="568" y1="635" x2="568" y2="622" stroke-width="1"/>
        <circle cx="570" cy="625" r="1.6"/>
      </g>

      <!-- 低空云气（覆水） -->
      <path d="M-50,660 C200,640 500,678 800,650 C1000,632 1200,658 1250,652 L1250,710 C1000,700 700,728 400,708 C200,694 50,712 -50,700Z" fill="#fff" opacity="0.16" filter="url(#ink-blur)"/>

      <!-- 前景山石（左） -->
      <path d="M0,720 Q50,700 100,718 L140,740 L100,762 L0,772Z" fill="#2a2824" opacity="0.62"/>
      <!-- 前景山石（右） -->
      <path d="M1060,708 Q1120,694 1170,716 L1200,732 L1200,772 L1080,760Z" fill="#2a2824" opacity="0.62"/>

      <!-- 前景水墨晕染（底缘） -->
      <path d="M0,748 Q300,728 600,752 Q900,772 1200,738 L1200,800 L0,800Z" fill="#15140f" opacity="0.24" filter="url(#ink-blur)"/>

      <!-- 朱印（落款） -->
      <g transform="translate(1090,690)">
        <rect x="0" y="0" width="34" height="34" fill="#8b3a3a" opacity="0.88" rx="2"/>
        <text x="17" y="25" text-anchor="middle" fill="#f5e9d3" font-family="serif" font-size="22" font-weight="700">墨</text>
      </g>
    </svg>
    <div class="map-overlay" id="mapOverlay"></div>
  </main>

  <!-- 诗词浮层 -->
  <div class="poem-overlay" id="poemOverlay" hidden>
    <div class="poem-backdrop"></div>
    <article class="poem-card" role="dialog" aria-labelledby="poemTitle">
      <button class="poem-close" id="poemClose" aria-label="关闭">&times;</button>
      <div class="poem-seal" id="poemSeal"></div>
      <h2 class="poem-title" id="poemTitle"></h2>
      <p class="poem-meta" id="poemMeta"></p>
      <div class="poem-body" id="poemBody"></div>
      <p class="poem-note" id="poemNote"></p>
    </article>
  </div>

  <footer class="site-footer">
    <p>山河万里，诗意千秋</p>
  </footer>

  <script src="poems.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
