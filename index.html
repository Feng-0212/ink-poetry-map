<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>墨韵山河 · 诗地图</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@300;400;600&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="paper-texture"></div>
  <div class="mist mist-1"></div>
  <div class="mist mist-2"></div>

  <header class="site-header">
    <h1 class="site-title">墨韵山河</h1>
    <p class="site-subtitle">点击山水，诗自浮现</p>
  </header>

  <main class="map-container">
    <svg class="ink-map" viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg" aria-label="水墨山河诗地图">
      <defs>
        <filter id="ink-blur" x="-20%" y="-20%" width="140%" height="140%">
          <feGaussianBlur in="SourceGraphic" stdDeviation="2"/>
        </filter>
        <filter id="ink-wash" x="-30%" y="-30%" width="160%" height="160%">
          <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="3" result="noise"/>
          <feDisplacementMap in="SourceGraphic" in2="noise" scale="6" xChannelSelector="R" yChannelSelector="G"/>
          <feGaussianBlur stdDeviation="1.2"/>
        </filter>
        <linearGradient id="skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stop-color="#e8e4dc"/>
          <stop offset="60%" stop-color="#d4cfc4"/>
          <stop offset="100%" stop-color="#c8c0b0"/>
        </linearGradient>
        <linearGradient id="waterGrad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="#8a9a9e" stop-opacity="0.3"/>
          <stop offset="50%" stop-color="#6b7d82" stop-opacity="0.5"/>
          <stop offset="100%" stop-color="#8a9a9e" stop-opacity="0.3"/>
        </linearGradient>
        <radialGradient id="mountainGrad" cx="50%" cy="30%">
          <stop offset="0%" stop-color="#4a4a48" stop-opacity="0.9"/>
          <stop offset="100%" stop-color="#2a2a28" stop-opacity="0.4"/>
        </radialGradient>
      </defs>

      <!-- 天空 -->
      <rect width="1200" height="800" fill="url(#skyGrad)"/>

      <!-- 远山层 -->
      <path class="mountain far" d="M0,420 Q150,280 300,380 T600,320 T900,360 T1200,300 L1200,800 L0,800Z" fill="#9a9590" opacity="0.35"/>
      <path class="mountain far" d="M0,480 Q200,350 450,420 T800,380 T1200,400 L1200,800 L0,800Z" fill="#8a8580" opacity="0.4"/>

      <!-- 主江河 -->
      <path class="river" d="M-50,520 Q200,500 400,540 Q600,580 800,520 Q1000,460 1250,500 L1250,800 L-50,800Z" fill="url(#waterGrad)" filter="url(#ink-blur)"/>
      <path class="river-shimmer" d="M100,530 Q350,510 550,550 Q750,590 950,530" fill="none" stroke="#ffffff" stroke-opacity="0.15" stroke-width="2"/>

      <!-- 中景山峦 -->
      <path class="mountain mid" d="M80,500 Q180,320 280,400 Q380,280 480,380 Q580,260 680,360 Q780,300 880,400 Q980,340 1080,420 L1080,800 L80,800Z" fill="#5c5a56" opacity="0.55" filter="url(#ink-wash)"/>

      <!-- 近景主峰 — 华山 -->
      <g class="poem-spot" data-poem="huashan" tabindex="0" role="button" aria-label="华山">
        <path class="mountain near" d="M420,800 L520,280 L620,800Z" fill="#2e2e2c" opacity="0.85"/>
        <path class="mountain near" d="M480,800 L560,380 L640,800Z" fill="#1a1a18" opacity="0.7"/>
        <circle class="spot-glow" cx="560" cy="320" r="28"/>
        <text class="spot-label" x="560" y="260">华山</text>
      </g>

      <!-- 庐山瀑布区 -->
      <g class="poem-spot" data-poem="lushan" tabindex="0" role="button" aria-label="庐山">
        <path class="mountain near" d="M180,800 L260,420 L340,800Z" fill="#3a3a38" opacity="0.75"/>
        <path class="waterfall" d="M248,420 Q252,500 250,580 Q248,620 252,680" stroke="#7a8a90" stroke-width="4" fill="none" opacity="0.6"/>
        <circle class="spot-glow" cx="250" cy="400" r="24"/>
        <text class="spot-label" x="250" y="370">庐山</text>
      </g>

      <!-- 西湖 -->
      <g class="poem-spot" data-poem="xihu" tabindex="0" role="button" aria-label="西湖">
        <ellipse class="lake" cx="850" cy="620" rx="90" ry="45" fill="#6b7d82" opacity="0.45"/>
        <circle class="spot-glow" cx="850" cy="620" r="22"/>
        <text class="spot-label" x="850" y="580">西湖</text>
      </g>

      <!-- 竹林山居 -->
      <g class="poem-spot" data-poem="shanju" tabindex="0" role="button" aria-label="山居">
        <g class="bamboo" transform="translate(720, 480)">
          <line x1="0" y1="0" x2="0" y2="80" stroke="#3a4a3a" stroke-width="3"/>
          <line x1="15" y1="10" x2="15" y2="90" stroke="#2a3a2a" stroke-width="2.5"/>
          <line x1="30" y1="5" x2="30" y2="85" stroke="#3a4a3a" stroke-width="3"/>
          <line x1="-8" y1="20" x2="38" y2="35" stroke="#4a5a4a" stroke-width="1.5"/>
          <line x1="-5" y1="45" x2="35" y2="55" stroke="#4a5a4a" stroke-width="1.5"/>
        </g>
        <rect class="pavilion" x="740" y="530" width="40" height="30" fill="#2a2a28" opacity="0.6" rx="2"/>
        <circle class="spot-glow" cx="750" cy="520" r="22"/>
        <text class="spot-label" x="750" y="490">山居</text>
      </g>

      <!-- 边塞 -->
      <g class="poem-spot" data-poem="bianse" tabindex="0" role="button" aria-label="边塞">
        <path class="greatwall" d="M950,350 L980,340 L1010,355 L1040,345 L1070,360 L1100,350" stroke="#3a3a38" stroke-width="3" fill="none"/>
        <circle class="spot-glow" cx="1020" cy="340" r="22"/>
        <text class="spot-label" x="1020" y="310">边塞</text>
      </g>

      <!-- 月夜 -->
      <g class="poem-spot" data-poem="yueye" tabindex="0" role="button" aria-label="月夜">
        <circle class="moon" cx="980" cy="120" r="40" fill="#e8e4d8" opacity="0.85"/>
        <circle class="moon-crater" cx="965" cy="110" r="8" fill="#d4cfc0" opacity="0.3"/>
        <circle class="spot-glow" cx="980" cy="120" r="30"/>
        <text class="spot-label" x="980" y="190">月夜</text>
      </g>

      <!-- 春晓桃花 -->
      <g class="poem-spot" data-poem="chunxiao" tabindex="0" role="button" aria-label="春晓">
        <g class="peach-tree" transform="translate(320, 580)">
          <path d="M0,80 Q-5,40 0,0 Q5,40 0,80" stroke="#4a3a3a" stroke-width="4" fill="none"/>
          <circle cx="-20" cy="15" r="8" fill="#8a5a5a" opacity="0.5"/>
          <circle cx="18" cy="25" r="7" fill="#9a6a6a" opacity="0.45"/>
          <circle cx="-8" cy="35" r="6" fill="#7a4a4a" opacity="0.4"/>
        </g>
        <circle class="spot-glow" cx="320" cy="580" r="22"/>
        <text class="spot-label" x="320" y="550">春晓</text>
      </g>

      <!-- 枫桥夜泊 -->
      <g class="poem-spot" data-poem="fengqiao" tabindex="0" role="button" aria-label="枫桥">
        <path class="bridge" d="M580,680 Q650,640 720,680" stroke="#2a2a28" stroke-width="4" fill="none"/>
        <path class="bridge" d="M590,680 L590,700 M650,655 L650,700 M710,680 L710,700" stroke="#2a2a28" stroke-width="2"/>
        <circle class="spot-glow" cx="650" cy="660" r="22"/>
        <text class="spot-label" x="650" y="630">枫桥</text>
      </g>

      <!-- 江雪 -->
      <g class="poem-spot" data-poem="jiangxue" tabindex="0" role="button" aria-label="江雪">
        <g transform="translate(480, 640)">
          <ellipse cx="0" cy="0" rx="25" ry="8" fill="#1a1a18" opacity="0.5"/>
          <line x1="0" y1="-15" x2="0" y2="15" stroke="#2a2a28" stroke-width="2"/>
        </g>
        <circle class="spot-glow" cx="480" cy="640" r="22"/>
        <text class="spot-label" x="480" y="610">江雪</text>
      </g>

      <!-- 黄鹤楼 -->
      <g class="poem-spot" data-poem="huanghelou" tabindex="0" role="button" aria-label="黄鹤楼">
        <g class="tower" transform="translate(380, 500)">
          <rect x="-15" y="0" width="30" height="50" fill="#3a3a38" opacity="0.7"/>
          <path d="M-20,0 L20,0 L15,-15 L-15,-15Z" fill="#2a2a28" opacity="0.8"/>
          <path d="M-18,-15 L18,-15 L12,-28 L-12,-28Z" fill="#2a2a28" opacity="0.7"/>
        </g>
        <circle class="spot-glow" cx="380" cy="490" r="22"/>
        <text class="spot-label" x="380" y="460">黄鹤楼</text>
      </g>

      <!-- 前景水墨晕染 -->
      <path class="ink-splash" d="M0,750 Q300,720 600,760 Q900,780 1200,740 L1200,800 L0,800Z" fill="#1a1a18" opacity="0.08"/>
    </svg>
  </main>

  <!-- 诗词浮层 -->
  <div class="poem-overlay" id="poemOverlay" hidden>
    <div class="poem-backdrop"></div>
    <article class="poem-card" role="dialog" aria-labelledby="poemTitle">
      <button class="poem-close" id="poemClose" aria-label="关闭">&times;</button>
      <div class="poem-seal" id="poemSeal"></div>
      <h2 class="poem-title" id="poemTitle"></h2>
      <p class="poem-meta" id="poemMeta"></p>
      <div class="poem-body" id="poemBody"></div>
      <p class="poem-note" id="poemNote"></p>
    </article>
  </div>

  <footer class="site-footer">
    <p>山河万里，诗意千秋</p>
  </footer>

  <script src="js/main.js"></script>
</body>
</html>
