<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>墨韵山河 · 诗地图</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@300;400;600&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="paper-texture"></div>
  <div class="mist mist-1"></div>
  <div class="mist mist-2"></div>

  <header class="site-header">
    <h1 class="site-title">墨韵山河</h1>
    <p class="site-subtitle">点击山水，诗自浮现</p>
  </header>

  <main class="map-container">
    <svg class="ink-map" viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg" aria-label="水墨山河诗地图">
      <defs>
        <filter id="ink-blur" x="-20%" y="-20%" width="140%" height="140%">
          <feGaussianBlur in="SourceGraphic" stdDeviation="2"/>
        </filter>
        <filter id="ink-wash" x="-30%" y="-30%" width="160%" height="160%">
          <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="3" result="noise"/>
          <feDisplacementMap in="SourceGraphic" in2="noise" scale="6" xChannelSelector="R" yChannelSelector="G"/>
          <feGaussianBlur stdDeviation="1.2"/>
        </filter>
        <linearGradient id="skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stop-color="#e8e4dc"/>
          <stop offset="60%" stop-color="#d4cfc4"/>
          <stop offset="100%" stop-color="#c8c0b0"/>
        </linearGradient>
        <linearGradient id="waterGrad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="#8a9a9e" stop-opacity="0.3"/>
          <stop offset="50%" stop-color="#6b7d82" stop-opacity="0.5"/>
          <stop offset="100%" stop-color="#8a9a9e" stop-opacity="0.3"/>
        </linearGradient>
        <radialGradient id="mountainGrad" cx="50%" cy="30%">
          <stop offset="0%" stop-color="#4a4a48" stop-opacity="0.9"/>
          <stop offset="100%" stop-color="#2a2a28" stop-opacity="0.4"/>
        </radialGradient>
        <radialGradient id="sun" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#caa24a" stop-opacity="0.85"/>
          <stop offset="60%" stop-color="#caa24a" stop-opacity="0.3"/>
          <stop offset="100%" stop-color="#caa24a" stop-opacity="0"/>
        </radialGradient>
      </defs>

      <!-- 天空 -->
      <rect width="1200" height="800" fill="url(#skyGrad)"/>

      <!-- 落日 -->
      <circle cx="1010" cy="150" r="120" fill="url(#sun)"/>
      <circle cx="1010" cy="150" r="48" fill="#c79a3e" opacity="0.5" filter="url(#ink-blur)"/>

      <!-- 远山层 -->
      <path class="mountain far" d="M0,420 Q150,280 300,380 T600,320 T900,360 T1200,300 L1200,800 L0,800Z" fill="#9a9590" opacity="0.30"/>
      <path class="mountain far" d="M0,480 Q200,350 450,420 T800,380 T1200,400 L1200,800 L0,800Z" fill="#8a8580" opacity="0.38"/>

      <!-- 主江河 -->
      <path class="river" d="M-50,520 Q200,500 400,540 Q600,580 800,520 Q1000,460 1250,500 L1250,800 L-50,800Z" fill="url(#waterGrad)" filter="url(#ink-blur)"/>
      <path class="river-shimmer" d="M100,530 Q350,510 550,550 Q750,590 950,530" fill="none" stroke="#ffffff" stroke-opacity="0.15" stroke-width="2"/>

      <!-- 中景山峦 -->
      <path class="mountain mid" d="M80,500 Q180,320 280,400 Q380,280 480,380 Q580,260 680,360 Q780,300 880,400 Q980,340 1080,420 L1080,800 L80,800Z" fill="#5c5a56" opacity="0.5" filter="url(#ink-wash)"/>

      <!-- 云气 -->
      <path d="M120,150 C260,120 360,170 520,140 C420,180 300,200 200,200 Z" fill="#fff" opacity="0.16" filter="url(#ink-blur)"/>
      <path d="M760,110 C900,85 1000,130 1160,105 C1060,145 940,165 850,160 Z" fill="#fff" opacity="0.14" filter="url(#ink-blur)"/>

      <!-- 诗词胜迹：由 poems.json 自动生成 -->
      <g id="sites"></g>

      <!-- 前景水墨晕染 -->
      <path class="ink-splash" d="M0,760 Q300,730 600,765 Q900,785 1200,745 L1200,800 L0,800Z" fill="#1a1a18" opacity="0.08"/>
    </svg>
  </main>

  <!-- 诗词浮层 -->
  <div class="poem-overlay" id="poemOverlay" hidden>
    <div class="poem-backdrop"></div>
    <article class="poem-card" role="dialog" aria-labelledby="poemTitle">
      <button class="poem-close" id="poemClose" aria-label="关闭">&times;</button>
      <div class="poem-seal" id="poemSeal"></div>
      <h2 class="poem-title" id="poemTitle"></h2>
      <p class="poem-meta" id="poemMeta"></p>
      <div class="poem-body" id="poemBody"></div>
      <p class="poem-note" id="poemNote"></p>
    </article>
  </div>

  <footer class="site-footer">
    <p>山河万里，诗意千秋</p>
  </footer>

  <script src="js/main.js"></script>
</body>
</html>
